name: Bug report
description: Report a reproducible problem with the ECH NGINX lab stack
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Before submitting, remove secrets, tokens, private keys, real production hostnames, private IP mappings, and sensitive logs.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem clearly.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide as much detail as practical.
      value: |
        Operating system:
        CPU architecture:
        Docker version:
        Docker Compose version:
        NGINX version:
        OpenSSL ECH branch or commit:
        DNS provider:
        Test client:
        Test mode: local / LAN / public internet / relay-fronted
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Add the commands needed to reproduce the issue.
      render: bash
      placeholder: |
        docker compose config
        docker compose ps
        ./ech-test.sh internal
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Relevant command output
      description: Paste sanitized logs or command output.
      render: text
      placeholder: |
        Paste sanitized output here.
    validations:
      required: false

  - type: checkboxes
    id: security-check
    attributes:
      label: Security check
      description: Confirm that this issue does not expose sensitive information.
      options:
        - label: I did not include API tokens.
          required: true
        - label: I did not include private keys.
          required: true
        - label: I did not include TLS private key material.
          required: true
        - label: I did not include ECH private/generated key material.
          required: true
        - label: I did not include real internal hostnames or private IP mappings unless intentionally sanitized.
          required: true
        - label: I reviewed logs for authentication headers, cookies, tokens, or credentials.
          required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add anything else that may help.
    validations:
      required: false
