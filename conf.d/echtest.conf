server {
    listen 8443 ssl default_server;
    server_name public.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_ech_file /etc/nginx/ech/protected.example.com.pem.ech;

    add_header X-ECH-Status $ssl_ech_status always;
    add_header X-ECH-Outer-SNI $ssl_ech_outer_server_name always;
    add_header X-TLS-SNI $ssl_server_name always;

    location = /healthz {
        default_type text/plain;
        return 200 "ok public\n";
    }

    location = /ech-status {
        default_type text/html;
        return 200 '<!doctype html><html lang="en"><head><meta charset="utf-8"><title>ECH Status</title></head><body><h1>ECH Status</h1><table border="1" cellpadding="8" cellspacing="0"><tr><th>Field</th><th>Value</th></tr><tr><td>ECH status</td><td>$ssl_ech_status</td></tr><tr><td>Outer SNI</td><td>$ssl_ech_outer_server_name</td></tr><tr><td>Inner / TLS SNI</td><td>$ssl_server_name</td></tr><tr><td>Server block</td><td>public.example.com</td></tr></table></body></html>';
    }

    location = /ech-status.xhtml {
        default_type application/xhtml+xml;
        return 200 '<?xml version="1.0" encoding="UTF-8"?><html xmlns="http://www.w3.org/1999/xhtml"><head><title>ECH Status</title></head><body><h1>ECH Status</h1><table border="1" cellpadding="8" cellspacing="0"><tr><th>Field</th><th>Value</th></tr><tr><td>ECH status</td><td>$ssl_ech_status</td></tr><tr><td>Outer SNI</td><td>$ssl_ech_outer_server_name</td></tr><tr><td>Inner / TLS SNI</td><td>$ssl_server_name</td></tr><tr><td>Server block</td><td>public.example.com</td></tr></table></body></html>';
    }

    location / {
        default_type text/html;
        return 200 '<!doctype html><html lang="en"><head><meta charset="utf-8"><title>ECH nginx test</title></head><body><h1>ECH nginx public cover endpoint</h1><p>This is the public cover name used for ECH testing.</p><p><a href="/ech-status">View ECH status</a></p></body></html>';
    }
}

server {
    listen 8443 ssl;
    server_name protected.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    add_header X-ECH-Status $ssl_ech_status always;
    add_header X-ECH-Outer-SNI $ssl_ech_outer_server_name always;
    add_header X-TLS-SNI $ssl_server_name always;

    location = /healthz {
        default_type text/plain;
        return 200 "ok protected\n";
    }

    location = /ech-status {
        default_type text/html;
        return 200 '<!doctype html><html lang="en"><head><meta charset="utf-8"><title>ECH Status</title></head><body><h1>ECH Status</h1><table border="1" cellpadding="8" cellspacing="0"><tr><th>Field</th><th>Value</th></tr><tr><td>ECH status</td><td>$ssl_ech_status</td></tr><tr><td>Outer SNI</td><td>$ssl_ech_outer_server_name</td></tr><tr><td>Inner / TLS SNI</td><td>$ssl_server_name</td></tr><tr><td>Server block</td><td>protected.example.com</td></tr></table></body></html>';
    }

    location = /ech-status.xhtml {
        default_type application/xhtml+xml;
        return 200 '<?xml version="1.0" encoding="UTF-8"?><html xmlns="http://www.w3.org/1999/xhtml"><head><title>ECH Status</title></head><body><h1>ECH Status</h1><table border="1" cellpadding="8" cellspacing="0"><tr><th>Field</th><th>Value</th></tr><tr><td>ECH status</td><td>$ssl_ech_status</td></tr><tr><td>Outer SNI</td><td>$ssl_ech_outer_server_name</td></tr><tr><td>Inner / TLS SNI</td><td>$ssl_server_name</td></tr><tr><td>Server block</td><td>protected.example.com</td></tr></table></body></html>';
    }

    location / {
        default_type text/html;
        return 200 '<!doctype html><html lang="en"><head><meta charset="utf-8"><title>ECH nginx test</title></head><body><h1>ECH nginx protected origin test</h1><p>This page is generated by nginx for ECH testing.</p><table border="1" cellpadding="8" cellspacing="0"><tr><th>Field</th><th>Value</th></tr><tr><td>ECH status</td><td>$ssl_ech_status</td></tr><tr><td>Outer SNI</td><td>$ssl_ech_outer_server_name</td></tr><tr><td>Inner / TLS SNI</td><td>$ssl_server_name</td></tr></table><p><a href="/ech-status">View ECH status page</a></p><p><a href="/ech-status.xhtml">View XHTML status page</a></p></body></html>';
    }
}
